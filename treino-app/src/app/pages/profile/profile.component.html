<div class="container-profile">
    <div class="container mt-5">
        <h1>Perfil do Usuário</h1>
        <div *ngIf="user">
            <p><strong>Nome:</strong> {{ user.nomeCompleto }}</p>
            <p><strong>Sexo:</strong> {{ user.sexo }}</p>
            <p><strong>Idade:</strong> {{ user.idade }}</p>
            <p><strong>Peso:</strong> {{ user.peso }} kg</p>
    
            <app-btn-link [route]="'/treinos'" [texto]=" 'ir para treino'"></app-btn-link>
            <app-btn-link [route]="'/home'" [texto]=" 'voltar'"></app-btn-link>
        </div>
    </div>
</div>
